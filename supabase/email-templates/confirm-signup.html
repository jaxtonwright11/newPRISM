<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0F1114;padding:40px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <tr>
    <td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:460px;background-color:#1A1D23;border-radius:16px;border:1px solid #2A2D35;overflow:hidden">
        <!-- Header -->
        <tr>
          <td style="padding:32px 32px 0;text-align:center">
            <span style="font-size:22px;font-weight:700;letter-spacing:3px;color:#D4956B">PRISM</span>
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="padding:24px 32px 32px">
            <h1 style="margin:0 0 8px;font-size:20px;font-weight:600;color:#F0EDE8">Confirm your email</h1>
            <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#9B978F">
              Welcome to PRISM. Tap the button below to verify your email and start sharing your community's perspective.
            </p>
            <table cellpadding="0" cellspacing="0" width="100%">
              <tr>
                <td align="center">
                  <a href="{{ .ConfirmationURL }}"
                     style="display:inline-block;padding:12px 32px;background-color:#D4956B;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;border-radius:12px;min-width:180px;text-align:center">
                    Verify email address
                  </a>
                </td>
              </tr>
            </table>
            <p style="margin:24px 0 0;font-size:12px;line-height:1.5;color:#6B6862">
              If you didn't create a PRISM account, you can safely ignore this email.
            </p>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="padding:16px 32px;border-top:1px solid #2A2D35;text-align:center">
            <span style="font-size:11px;color:#6B6862">PRISM — Community Perspectives</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
